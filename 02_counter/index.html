<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
</head>
<body>
    <h1 id="num">0</h1>
    <button class="plus" onclick="plus()">[+1]</button> 
    <button class="plus" onclick="plus(+2)">[+2]</button> 
    <button class="plus" onclick="minus(-1)">[-]</button> 
    <button class="plus" onclick="reset()">reset</button> 
    <script src="main.js"></script>
</body>
</html>

<!-- onclick = "plus()"" 괄호 붙여야함! 시험문제임 -->
